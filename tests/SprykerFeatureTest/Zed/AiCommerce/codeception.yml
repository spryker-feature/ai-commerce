namespace: SprykerFeatureTest\Zed\AiCommerce
paths:
    tests: .
    data: ../../../_data
    support: _support
    output: ../../../_output
coverage:
    enabled: true
    remote: false
    whitelist:
        include:
            - '../../../../src/*'
suites:
    Business:
        path: Business
        actor: AiCommerceBusinessTester
        modules:
            enabled:
                - Asserts
                - \SprykerTest\Shared\Testify\Helper\Environment
                - \SprykerTest\Shared\Testify\Helper\ConfigHelper
                - \SprykerTest\Shared\Testify\Helper\LocatorHelper
                - \SprykerTest\Shared\Testify\Helper\DependencyHelper
                - \SprykerTest\Shared\Testify\Helper\DataCleanupHelper
                - \SprykerTest\Zed\Testify\Helper\Business\BusinessHelper
                - \SprykerTest\Shared\Propel\Helper\TransactionHelper
                - \SprykerTest\Shared\Shipment\Helper\ShipmentMethodDataHelper
                - \SprykerTest\Shared\Sales\Helper\SalesHelper
                - \SprykerTest\Zed\Oms\Helper\OmsHelper
                - \SprykerTest\Shared\Discount\Helper\DiscountDataHelper
                - \SprykerFeatureTest\Zed\AiCommerce\Helper\AiCommerceHelper
